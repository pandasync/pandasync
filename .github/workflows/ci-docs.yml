name: CI -- Docs

on:
  push:
    branches: [main]
    paths: ["docs/**", "spec/**"]
  pull_request:
    paths: ["docs/**", "spec/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Install MkDocs
        run: uv venv && uv pip install mkdocs-material
      - name: Build docs
        working-directory: docs
        run: uv run mkdocs build --strict
